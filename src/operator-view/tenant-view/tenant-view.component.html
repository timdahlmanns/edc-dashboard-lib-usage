<div class="flex-row flex-nowrap flex mb-4">
  <select
    class="select select-lg rounded-2xl shadow-xl !text-sm mr-4"
    [ngModel]="selectedProviderId()"
    (ngModelChange)="onProviderChange($event)">
    <option [ngValue]="null" disabled>Service provider ...</option>
    @for (provider of serviceProviders(); track provider.id) {
      <option [ngValue]="provider.id">{{ provider.name }} (#{{ provider.id }})</option>
    }
  </select>

  <lib-filter-input
    placeholder="Filter for tenant ID, name or participant ..."
    [focusShortcut]="['Alt', 'j']"
    class="mr-4 grow"
    (inputChange)="filter($event)"></lib-filter-input>

  @if (mode() === 'open') {
    <button
      class="mr-4 btn btn-lg btn-primary rounded-2xl btn-soft shadow-xl !text-sm border-none"
      [disabled]="selectedProviderId() === null"
      (click)="openRegisterTenant()">
      <span class="material-symbols-rounded">person_add</span>
      Register tenant
    </button>
  }
  <button
    class="mr-4 btn btn-lg btn-soft rounded-2xl shadow-xl !text-sm border-none"
    (click)="openCreateProvider()">
    <span class="material-symbols-rounded">domain_add</span>
    Provider
  </button>
  <button
    class="mr-4 btn btn-lg btn-soft rounded-2xl shadow-xl !text-sm border-none"
    (click)="openCreateDataspace()">
    <span class="material-symbols-rounded">hub</span>
    Dataspace
  </button>

  <lib-item-count-selector
    class="mr-4"
    [currentItemCount]="pageItemCount"
    (itemCountChanged)="pageItemCount = $event"></lib-item-count-selector>
  <lib-pagination
    [items]="visibleTenants()"
    [pageItemCount]="pageItemCount"
    (pageItems)="paginationEvent($event)"
    class="shadow-xl rounded-2xl bg-base-300 [&_button:hover]:bg-base-100 [&_.join>button]:first:rounded-l-2xl [&_.join>button]:last:rounded-r-2xl"></lib-pagination>
</div>

<div class="grid w-full gap-4 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5">
  @for (tenant of pageTenants(); track tenant.id) {
    <tenant-card
      class="rounded-2xl shadow-xl [&_>.card]:h-full"
      [tenant]="tenant"
      [dataspaces]="dataspaces()"
      [canDeploy]="mode() === 'open'"
      [pollingParticipantIds]="pollingParticipantIds()"
      (deploy)="deployParticipant(tenant, $event)"
      (registerDataPlane)="registerDataPlane(tenant, $event)"></tenant-card>
  }
  @if (visibleTenants().length == 0) {
    <div class="skeleton flex justify-center items-center h-72 shadow-xl rounded-2xl">
      @if (!fetched()) {
        <span class="loading loading-bars loading-lg opacity-75 text-primary"></span>
      } @else if (selectedProviderId() === null) {
        <div class="tooltip tooltip-open tooltip-primary" data-tip="Select or create a service provider first ...">
          <button class="btn btn-primary btn-dash" (click)="openCreateProvider()">
            <span class="material-symbols-rounded">domain_add</span>
            New provider
          </button>
        </div>
      } @else if (mode() === 'open') {
        <div class="tooltip tooltip-open tooltip-primary" data-tip="No open registrations! Register your first ...">
          <button class="btn btn-primary btn-dash" (click)="openRegisterTenant()">
            <span class="material-symbols-rounded">person_add</span>
            Register tenant
          </button>
        </div>
      } @else {
        <div class="tooltip tooltip-open tooltip-primary" data-tip="No deployed tenants yet. Deploy one from Open Registrations ...">
          <span class="flex items-center gap-2 opacity-70">
            <span class="material-symbols-rounded">groups</span>
            No deployed tenants
          </span>
        </div>
      }
    </div>
  }
</div>
